esphome:
  name: esphome-web-31b1a4
  friendly_name: "Інвертор"

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

i2c:
  sda: 8
  scl: 9
  scan: true

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

globals:
  - id: battery_capacity
    type: float
    restore_value: no
    initial_value: '200.0' # Твоя ємність АКБ

sensor:
  - platform: ina226
    address: 0x40
    shunt_resistance: 0.00075 ohm
    max_current: 150A
    update_interval: 1s

    bus_voltage:
      id: battery_voltage
      name: "Напруга"
      filters:
        - calibrate_linear:
            # КАЛІБРУВАННЯ НАПРУГИ (підстав свої заміри мультиметром)
            - 24.0 -> 24.2
            - 28.0 -> 28.3
            
    current:
      id: battery_current
      name: "Струм"
      filters:
        - multiply: -1.0
        # КАЛІБРУВАННЯ СТРУМУ (підтягуємо показники до PowMr)
        - calibrate_linear:
            - 0.0 -> 0.0
            - 12.0 -> 17.0
        # Фільтр від різких стрибків (ковзне середнє за 5 замірів)
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
        # Мертва зона: якщо струм менше 0.6А, вважаємо це спокоєм
        - lambda: "return (std::abs(x) < 0.6) ? 0.0 : x;"

  # Лічильник використаних Ач з захистом від "мінуса"
  - platform: integration
    id: used_ah
    name: "Використано Ач"
    sensor: battery_current
    time_unit: h
    accuracy_decimals: 3
    restore: true 
    integration_method: trapezoid
    filters:
      # Якщо значення стає менше 0 (перезаряд), скидаємо в 0
      - lambda: "return (x < 0) ? 0 : x;"

  - platform: template
    id: battery_soc
    name: "Заряд батареї"
    unit_of_measurement: "%"
    device_class: battery
    update_interval: 10s
    lambda: |-
      if (!id(used_ah).has_state()) return NAN;
      float soc = ((id(battery_capacity) - id(used_ah).state) / id(battery_capacity)) * 100.0f;
      
      // Автоматичне вирівнювання: якщо інвертор "набив" АКБ понад 100%, 
      // скидаємо лічильник витрат, фіксуючи нову точку відліку
      if (soc > 100.0f) {
        id(used_ah).publish_state(0.0);
        return 100.0f;
      }
      return std::clamp(soc, 0.0f, 100.0f);

  - platform: template
    id: battery_time_remaining
    name: "Час до зміни стану"
    unit_of_measurement: "год"
    update_interval: 10s
    lambda: |-
      float i = id(battery_current).state;
      float capacity = id(battery_capacity);
      float used = id(used_ah).state;
      if (std::abs(i) < 0.1f) return NAN; 
      if (i > 0) {
        return (capacity - used) / i;
      } else {
        return used / std::abs(i);
      }

  - platform: template
    name: "Потужність"
    id: battery_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      return id(battery_voltage).state * id(battery_current).state;

text_sensor:
  - platform: template
    name: "Статус роботи"
    id: status_roboti
    icon: "mdi:clock-check"
    update_interval: 10s
    lambda: |-
      float i = id(battery_current).state;
      float used = id(used_ah).state;

      // Якщо струму майже немає
      if (std::abs(i) < 0.1f) return {"Очікування"};

      if (i > 0) {
        return {"До розряду"};
      } else {
        // Якщо струм на заряд, але ми вже використали 0 Ач (тобто 100%)
        if (used <= 0.1f) {
          return {"Заряджено (Мережа)"};
        } else {
          return {"Зарядка АКБ"};
        }
      }

button:
  - platform: template
    name: "Скинути на 100%"
    icon: "mdi:battery-check"
    on_press:
      - sensor.integration.reset: used_ah