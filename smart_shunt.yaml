esphome:
  name: esphome-web-31b1a4
  friendly_name: "Інвертор"

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

# Піни I2C для SuperMini
i2c:
  sda: 8 
  scl: 9
  scan: true
  id: bus_a

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

globals:
  - id: battery_capacity
    type: float
    restore_value: no
    initial_value: '200.0'

sensor:
  - platform: ina226
    address: 0x40
    shunt_resistance: 0.00075 ohm
    max_current: 150A
    update_interval: 1s

    bus_voltage:
      id: battery_voltage
      name: "Battery Voltage"
      unit_of_measurement: "V"
      accuracy_decimals: 2
      filters:
        - calibrate_linear:
            - 27.0 -> 27.0
            - 24.0 -> 24.0

    current:
      id: battery_current
      name: "Battery Current"
      unit_of_measurement: "A"
      accuracy_decimals: 2
      filters:
        - calibrate_linear:
            - 10.0 -> 16.6  
            - 20.0 -> 33.2
            - 36.0 -> 59.76
        - multiply: -1.0
        - sliding_window_moving_average:
            window_size: 10
            send_every: 1

  # --- ДВОСТОРОННІЙ ПРОГРАМНИЙ ШЛЮЗ (Deadband) ---
  # Пропускає розряд (> 0.3A) ТА заряд (< -0.3A).
  # Відсікає лише мікро-шуми від -0.3A до 0.3A (режим Float).
  - platform: template
    id: filtered_battery_current
    name: "Filtered Battery Current"
    internal: true
    unit_of_measurement: "A"
    lambda: |-
      float current = id(battery_current).state;
      if (current > 0.3 || current < -0.3) {
        return current;
      } else {
        return 0.0;
      }
    update_interval: 1s

  - platform: template
    name: "Battery Power"
    id: battery_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    lambda: return id(battery_voltage).state * id(battery_current).state;
    update_interval: 1s

  # Лічильник витрати (Ah) - тепер рахує і в плюс, і в мінус
  - platform: integration
    id: used_ah
    name: "Used Ah"
    # Беремо дані з нового двостороннього шлюзу
    sensor: filtered_battery_current
    time_unit: h
    restore: true
    integration_method: trapezoid
    on_value:
      # АПАРАТНИЙ ЗАПОБІЖНИК:
      # Якщо під час зарядки витрата впала нижче 0.0 Ah, жорстко фіксуємо її на нулі.
      then:
        - if:
            condition:
              lambda: 'return x < 0.0;'
            then:
              - sensor.integration.reset: used_ah

  # Рівень заряду (SOC)
  - platform: template
    name: "Battery SOC"
    id: battery_soc
    unit_of_measurement: "%"
    accuracy_decimals: 1
    device_class: battery
    lambda: |-
      float capacity = id(battery_capacity); 
      float used = id(used_ah).state;
      if (capacity <= 0.0) return 0.0; 
      
      float soc = ((capacity - used) / capacity) * 100.0;
      if (soc > 100.0) return 100.0;
      if (soc < 0.0) return 0.0;
      return soc;
    update_interval: 5s

# Надійна автоматична синхронізація 100%
interval:
  - interval: 10s
    then:
      - if:
          condition:
            lambda: 'return id(battery_voltage).state >= 28.3 && id(battery_current).state < 0.0;'
          then:
            # Правильний синтаксис апаратного очищення масиву
            - sensor.integration.reset: used_ah

button:
  - platform: template
    name: "Reset to 100%"
    on_press:
      then:
        # Правильний синтаксис очищення пам'яті по кнопці
        - sensor.integration.reset: used_ah

# --- ТЕКСТОВІ СЕНСОРИ (Прогнозування часу) ---
text_sensor:
  - platform: template
    name: "Time Remaining"
    id: time_remaining
    icon: "mdi:clock-outline"
    update_interval: 10s
    lambda: |-
      float current = id(battery_current).state;
      float capacity = id(battery_capacity);
      float used = id(used_ah).state;

      // Захист від NaN (коли сенсори ще не прокинулися після перезавантаження)
      if (isnan(current) || isnan(used)) return std::string("Обчислення...");

      float remaining_ah = capacity - used;
      if (remaining_ah < 0.0) remaining_ah = 0.0;
      if (used < 0.0) used = 0.0;

      char buffer[64];

      // 1. СЦЕНАРІЙ РОЗРЯДУ (Струм більше 0.5A)
      if (current > 0.5) {
        float hours = remaining_ah / current;
        int h = (int)hours;
        int m = (int)((hours - h) * 60);
        
        // Якщо залишилося більше 100 годин (дуже мале навантаження)
        if (h > 100) return std::string("> 100 годин");
        
        snprintf(buffer, sizeof(buffer), "%dг %02dхв (Залишилось)", h, m);
        return std::string(buffer);
      } 
      // 2. СЦЕНАРІЙ ЗАРЯДУ (Струм менше -0.5A)
      else if (current < -0.5) {
        float charge_current = -current; // Робимо струм позитивним для математики
        float hours = used / charge_current; // Рахуємо час до повного відшкодування витрати
        int h = (int)hours;
        int m = (int)((hours - h) * 60);
        
        // Якщо батарея майже повна
        if (used <= 0.5) return std::string("Заряджено");
        
        snprintf(buffer, sizeof(buffer), "%dг %02dхв (До повного)", h, m);
        return std::string(buffer);
      } 
      // 3. СЦЕНАРІЙ ПРОСТОЮ / FLOAT (Струм у межах мертвої зони)
      else {
        if (used <= 0.5) return std::string("100% / Float");
        return std::string("Очікування");
      }